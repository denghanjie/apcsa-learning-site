<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AP CSA Learning Hub</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --surface: #ffffff;
        --ink: #17201c;
        --muted: #65736d;
        --line: #d9e2dc;
        --accent: #0d766f;
        --accent-strong: #075d58;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        width: min(780px, 100%);
      }

      p {
        margin: 0;
      }

      .eyebrow {
        margin-bottom: 8px;
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 42px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 560px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.5;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 28px;
      }

      .app-card {
        min-height: 92px;
        display: grid;
        align-content: center;
        gap: 6px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        text-decoration: none;
      }

      .app-card:hover {
        border-color: var(--accent);
      }

      .app-card strong,
      .app-card span {
        display: block;
      }

      .app-card strong {
        font-size: 19px;
      }

      .app-card span {
        color: var(--muted);
        line-height: 1.4;
      }

      .contact-card {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 104px minmax(0, 1fr);
        gap: 18px;
        align-items: center;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .qr-block {
        display: grid;
        gap: 6px;
        justify-items: center;
      }

      .qr-block img {
        width: 104px;
        aspect-ratio: 1;
        object-fit: cover;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .qr-block span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .contact-card h2 {
        margin: 0 0 6px;
        font-size: 22px;
        letter-spacing: 0;
      }

      .contact-card p {
        color: var(--muted);
      }

      .contact-card a {
        display: inline-block;
        margin-top: 10px;
        color: var(--accent);
        font-weight: 800;
        text-decoration: none;
        overflow-wrap: anywhere;
      }

      @media (max-width: 640px) {
        h1 {
          font-size: 34px;
        }

        .links {
          grid-template-columns: 1fr;
        }

        .contact-card {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">AP Computer Science A</p>
      <h1>Learning Hub</h1>
      <p class="subtitle">Diagnostic testing and detailed topic-by-topic tutorials from the generated APCSA materials.</p>

      <div class="links">
        <a class="app-card" href="Generated_Materials/Web_App/index.html">
          <strong>Diagnostic Test</strong>
          <span>Take the assessment and generate a study report.</span>
        </a>
        <a class="app-card" href="Generated_Materials/Tutorial_Web_App/index.html">
          <strong>Interactive Tutorials</strong>
          <span>Study every knowledge-tree point with practice and notes.</span>
        </a>
      </div>

      <section class="contact-card" aria-label="Contact">
        <div class="qr-block">
          <img src="Generated_Materials/QRCode.jpg" alt="WeChat QR code for 心奇好">
          <span>微信扫码</span>
        </div>
        <div>
          <h2>心奇好</h2>
          <p>Author</p>
        </div>
      </section>
    </main>
  </body>
</html>
